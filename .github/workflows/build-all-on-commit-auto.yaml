name: Build Octopub
permissions:
  contents: write
  packages: write
on:
  workflow_dispatch:
  push: 
    branches:
      - main
    paths:
      - 'update-file.txt'

jobs:
  build-audits:
    #runs-on: ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Build Audit Microservice
        uses: ./github/java-microservice
        with:
          run_number: ${{ github.run_number }}
          github_repo: ${{ github.repository }}
          github_token: ${{ github.token }}
          github_actor: ${{ github.actor }}          
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_password: ${{ secrets.DOCKERHUB_TOKEN }}
          service_directory: audit-microservice
          github_codefresh_token: ${{ secrets.CF_GITHUB_TOKEN }}
          codefresh_token: ${{ secrets.USER_TOKEN }}
          demo_url: ${{ secrets.DEMO_OCTOPUS_SERVER_URL }}
          demo_apikey: ${{ secrets.DEMO_OCTOPUS_API_KEY }}
          #octopus_space: ${{ secrets.OCTOPUS_SPACE }}
          octopus_space: "Administration"
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  build-frontend:
    #runs-on: ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Build Javascript Frontend
        uses: ./github/js-frontend
        with:
          run_number: ${{ github.run_number }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_password: ${{ secrets.DOCKERHUB_TOKEN }}
          github_token: ${{ github.token }}
          github_actor: ${{ github.actor }}
          demo_url: ${{ secrets.DEMO_OCTOPUS_SERVER_URL }}
          demo_apikey: ${{ secrets.DEMO_OCTOPUS_API_KEY }}
          octopus_space: "Administration"
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          
  build-products:
    #runs-on: ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Build Product Microservice
        uses: ./github/java-microservice
        with:
          run_number: ${{ github.run_number }}
          github_repo: ${{ github.repository }}
          github_token: ${{ github.token }}
          github_actor: ${{ github.actor }}          
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_password: ${{ secrets.DOCKERHUB_TOKEN }}
          service_directory: products-microservice
          github_codefresh_token: ${{ secrets.CF_GITHUB_TOKEN }}
          codefresh_token: ${{ secrets.USER_TOKEN }}
          demo_url: ${{ secrets.DEMO_OCTOPUS_SERVER_URL }}
          demo_apikey: ${{ secrets.DEMO_OCTOPUS_API_KEY }}
          octopus_space: "Administration"
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
